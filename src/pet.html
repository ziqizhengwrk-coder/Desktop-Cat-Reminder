<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Cat</title>
    <link rel="stylesheet" href="./pet.css" />
  </head>
  <body>
    <button id="cat" class="cat action-idle" aria-label="Open reminder status">
      <img class="pixel-cat" src="./assets/cat-transparent.png" alt="" draggable="false" />
      <span class="pulse" aria-hidden="true"></span>
    </button>
    <div id="petMenu" class="pet-menu hidden">
      <button id="quitApp" type="button">Quit</button>
    </div>
    <script src="./pet.js"></script>
  </body>
</html>
