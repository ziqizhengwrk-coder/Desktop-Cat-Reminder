<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Cat Reminder</title>
    <link rel="stylesheet" href="./status.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <div>
          <p class="eyebrow">Desktop Cat Reminder</p>
          <h1>Move Rhythm</h1>
        </div>
        <span id="mode" class="mode">Running</span>
      </header>

      <nav class="tabs" aria-label="Status pages">
        <button class="tab active" type="button" data-tab="overview">Overview</button>
        <button id="calendarTab" class="tab hidden" type="button" data-tab="calendar">Calendar</button>
        <button class="tab" type="button" data-tab="settings">Settings</button>
      </nav>

      <section id="overviewPage" class="tab-page active">
        <section class="timeline" aria-label="Next reminders">
          <article>
            <div>
              <h2>Stretch break</h2>
              <p>Near-desk stretch, neck and shoulder movement</p>
            </div>
            <strong id="stretchNext">--:--</strong>
          </article>
          <article>
            <div>
              <h2>Outdoor walk</h2>
              <p>Scheduled at <span id="walkTimes">11:30 / 17:30</span></p>
            </div>
            <strong id="walkNext">--:--</strong>
          </article>
        </section>

        <footer>
          <button id="resetPosition" type="button">Reset cat position</button>
          <p id="updated">Last updated --:--</p>
        </footer>
      </section>

      <section id="calendarPage" class="tab-page">
        <section class="calendar" aria-label="Completion calendar">
          <div class="section-title">
            <h2 id="calendarTitle">Calendar</h2>
            <span id="todayProgress">0/2</span>
          </div>
          <div class="weekdays" aria-hidden="true">
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
            <span>Sun</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>
      </section>

      <section id="settingsPage" class="tab-page">
        <form id="settingsForm" class="settings">
          <div class="section-title">
            <h2>Settings</h2>
            <span id="saveStatus">Saved</span>
          </div>

          <label>
            <span>Stretch interval</span>
            <input id="stretchInterval" type="number" min="5" max="240" step="1" />
            <small>minutes</small>
          </label>

          <label>
            <span>Snooze time</span>
            <input id="snoozeMinutes" type="number" min="1" max="60" step="1" />
            <small>minutes</small>
          </label>

          <label>
            <span>Outdoor walk count</span>
            <input id="walkCount" type="number" min="1" max="6" step="1" />
            <small>times/day</small>
          </label>

          <div id="walkTimeFields" class="time-grid"></div>

          <label class="toggle-row">
            <span>Lunch quiet time</span>
            <input id="lunchEnabled" type="checkbox" />
            <small>enabled</small>
          </label>

          <div class="time-grid">
            <label>
              <span>Lunch start</span>
              <input id="lunchStart" type="time" />
            </label>
            <label>
              <span>Lunch end</span>
              <input id="lunchEnd" type="time" />
            </label>
          </div>

          <label class="toggle-row">
            <span>Calendar tab</span>
            <input id="calendarEnabled" type="checkbox" />
            <small>enabled</small>
          </label>

          <button type="submit">Save settings</button>
        </form>
      </section>
    </main>
    <script src="./status.js"></script>
  </body>
</html>
