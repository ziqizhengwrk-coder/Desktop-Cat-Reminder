name: Build macOS installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --config.confirmModulesPurge=false --frozen-lockfile

      - name: Approve dependency build scripts
        run: pnpm approve-builds --all

      - name: Check JavaScript syntax
        run: pnpm run check

      - name: Build macOS package
        run: pnpm exec electron-builder --mac dmg zip --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-Cat-Reminder-mac-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
